# https://github.com/alacritty/alacritty/blob/master/alacritty.yml
import:
  - ~/.config/alacritty/catppuccin.yml
env:
  TERM: xterm-256color
window:
  decorations: None
  dimensions:
    columns: 120
    lines: 70
  position:
    x: 0
    y: 0
  padding:
    x: 5
    y: 5
font:
  normal:
    family: Hack Nerd Font
  bold:
    family: Hack Nerd Font
  italic:
    family: Hack Nerd Font
  bold_italic:
    family: Hack Nerd Font
  size: 18.0
    
cursor:
  # Cursor style
  style:
    shape: Block
    blinking: On
  vi_mode_style: Block
alt_send_esc: true
